<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日号</title>
<style>
  :root{
    --paper:#f7f2e8; --ink:#23211c; --red:#b5372e; --gray:#8a857b; --line:#d9d2c2;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#e8e2d4; color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
    display:flex; justify-content:center; min-height:100vh;
  }
  .app{
    width:100%; max-width:1060px; min-height:100vh; background:var(--paper);
    box-shadow:0 0 40px rgba(0,0,0,.15); padding-bottom:48px;
  }
  .serif{font-family:"Hiragino Mincho ProN","Yu Mincho","BIZ UDMincho",serif;}

  .bar{
    display:flex; align-items:baseline; gap:16px;
    padding:22px 28px 14px; border-bottom:2px solid var(--ink);
  }
  .bar h1{font-size:26px; letter-spacing:.12em;}
  .bar .d{font-size:12px; color:var(--gray); letter-spacing:.12em;}
  .bar .rest{margin-left:auto; font-size:12px; color:var(--red); letter-spacing:.1em;}

  .stage{animation:pg .25s ease;}
  @keyframes pg{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}

  .grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:30px 24px; padding:28px;
  }
  .card{cursor:pointer; position:relative;}
  .thumb{position:relative; aspect-ratio:16/9; background:#ccc; overflow:hidden;}
  .thumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .thumb .dur{
    position:absolute; right:6px; bottom:6px; background:rgba(0,0,0,.75);
    color:#fff; font-size:11px; padding:2px 6px;
  }
  .bd{
    position:absolute; left:0; top:0; padding:3px 10px; font-size:10.5px;
    letter-spacing:.2em; color:#fff; background:var(--gray); z-index:1;
  }
  .bd.teiban{background:#3f5c50;}
  .bd.hakken{background:var(--red);}
  .card h3{font-size:15px; line-height:1.5; margin:10px 0 4px; font-weight:600;}
  .card .ch{font-size:11.5px; color:var(--gray);}
  .card .ds{
    font-size:12px; color:#6b665c; line-height:1.75; margin-top:6px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .card.off{opacity:.38; cursor:default;}
  .cstamp{
    position:absolute; right:8px; top:8px; width:48px; height:48px; border-radius:50%;
    border:1.5px solid var(--red); color:var(--red); font-size:11px; font-weight:600;
    display:flex; align-items:center; justify-content:center; transform:rotate(-10deg);
    background:rgba(247,242,232,.9); z-index:2;
  }
  .cstamp.gray{border-color:var(--gray); color:var(--gray);}

  .art{max-width:780px; margin:0 auto; padding:20px 28px 0;}
  .back{
    background:none; border:none; color:var(--gray); font-size:12.5px;
    cursor:pointer; padding:6px 0 14px; letter-spacing:.1em;
  }
  .player{position:relative; width:100%; aspect-ratio:16/9; background:#111; overflow:hidden; cursor:pointer;}
  .player img{width:100%; height:100%; object-fit:cover; display:block; opacity:.92;}
  .player .pl{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:48px; text-shadow:0 2px 12px rgba(0,0,0,.6);
  }
  .player iframe{width:100%; height:100%; border:0; display:block;}
  .art h2{font-size:21px; line-height:1.5; margin:16px 0 4px;}
  .meta{font-size:12px; color:var(--gray); letter-spacing:.05em;}
  .meta a{color:var(--red); text-decoration:none; margin-left:12px;}
  .desc{font-size:13.5px; line-height:1.9; color:#57524a; margin-top:12px;}
  .acts{display:flex; gap:10px; margin-top:22px;}
  .next{
    flex:2; padding:14px; background:var(--ink); color:var(--paper); border:none;
    font-size:13.5px; letter-spacing:.15em; cursor:pointer;
  }
  .pass{
    flex:1; padding:14px; background:none; border:1px solid var(--line);
    color:var(--gray); font-size:12px; cursor:pointer;
  }
  .pass:active,.next:active,.card:active{transform:scale(.99);}

  .end{text-align:center; padding:110px 28px 0;}
  .end h2{font-size:42px; letter-spacing:.14em; margin-bottom:16px;}
  .end .stats{font-size:13px; color:var(--gray); letter-spacing:.12em; margin-bottom:8px;}
  .end .nx{font-size:14px; margin-top:22px;}
  .end .copy{
    margin:26px auto 0; display:block; padding:13px 26px;
    background:var(--ink); color:var(--paper); border:none;
    font-size:12.5px; letter-spacing:.12em; cursor:pointer;
  }
  .end .hint{font-size:11px; color:var(--gray); margin-top:10px; letter-spacing:.08em;}
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <h1 class="serif">今日号</h1>
    <span class="d" id="date"></span>
    <span class="rest" id="rest"></span>
  </div>
  <div id="stage"></div>
</div>

<script>
// ===== 号データ（自己完結・サーバ不要） =====
const ISSUE = {
  date: "2026.7.20 月",
  issue: "第4号・手仕事の時間",
  items: [
    {badge:"定番", cls:"teiban",
     title:"デス・バイシクル事件【 SqLA 】",
     ch:"SqLA さくら / Riddle", dur:"10:19", id:"fFK0W5TEEoI",
     desc:"この動画は、SqLAがサンリオコラボの思い出から、いにしえの害悪プレイヤー、呪物と化した自転車の黒歴史までを語るフリートーク切り抜きです。"},
    {badge:"準定番", cls:"teiban",
     title:"What happened to Nathaniel Drew?",
     ch:"Nathaniel Drew", dur:"19:59", id:"uxb8OjkiZBY",
     desc:"この動画では、しばらく姿を消していたNathaniel Drewが、トマス・アクィナスの逸話を入り口に「積み上げたものを維持するうちに迷子になった」経緯と、作ることへ戻ってくるまでを語ります。"},
    {badge:"発見", cls:"hakken",
     title:"レースのように美しい。新たなガラス工芸に挑戦する京都の職人",
     ch:"京都知新", dur:"10:58", id:"8TqxOJ98XOg",
     desc:"この動画では、螺旋の線がレース模様のように重なる透明なガラスを生み出す京都の職人の、制作過程と工房の日常を追います。"},
    {badge:"発見", cls:"hakken",
     title:"書道家のお仕事ルーティーン｜作品「日日是好日」ができるまで",
     ch:"書と水墨のある暮らし / 根本みき", dur:"14:01", id:"PDYuGXenJkg",
     desc:"この動画では、書家・根本みきが「日日是好日」を書き上げる一日を、道具の支度から墨の擦り、納得のいく一枚が生まれるまで自ら記録します。"},
    {badge:"発見", cls:"hakken",
     title:"庭と真摯に向き合う庭師の3日間の情熱ドキュメンタリー",
     ch:"ギフト【仕事密着72】", dur:"26:45", id:"1pU8q-kXz_M",
     desc:"この動画は、新潟の庭師・武沢広太の3日間——現場での剪定仕事から庭に向き合う時間まで——に密着したドキュメンタリーです。"},
    {badge:"発見", cls:"hakken",
     title:"森の工房でひとり。すご腕家具職人による吸い付き桟のテーブル制作工程",
     ch:"THE PROCESS", dur:"37:34", id:"ly0LrTQx3zA",
     desc:"この動画では、森の工房でひとり無垢材と向き合う家具職人YOAKEが、吸い付き桟のテーブルを木取りから仕上げまで完成させる全工程を見せます。"}
  ]
};
// ============================================

const IS_FILE = location.protocol === "file:";   // file://なら埋め込み不可→YouTube直接再生に切替
const PAGES = ISSUE.items;
const KEY = "kyougou_state_" + ISSUE.issue;
let S = PAGES.map(() => null);
try {
  const saved = JSON.parse(localStorage.getItem(KEY) || "null");
  if (Array.isArray(saved) && saved.length === PAGES.length) S = saved;
} catch(e) {}
const save = () => { try { localStorage.setItem(KEY, JSON.stringify(S)); } catch(e) {} };
let cur = 0;
const stage = document.getElementById("stage");
const restEl = document.getElementById("rest");
document.getElementById("date").textContent = `${ISSUE.date}　${ISSUE.issue}`;
const resolved = () => S.filter(x => x).length;
const updateRest = () => restEl.textContent = resolved() < PAGES.length ? `のこり ${PAGES.length - resolved()} 本` : "";

function grid(){
  updateRest();
  stage.innerHTML = `<div class="stage"><div class="grid">` + PAGES.map((p,i) => {
    const st = S[i];
    const stamp = st==="done" ? `<div class="cstamp serif">読了</div>`
                : st==="pass" ? `<div class="cstamp gray serif">パス</div>` : "";
    return `<div class="card ${st?"off":""}" ${st?"":`onclick="article(${i})"`}>
      ${stamp}
      <div class="thumb"><span class="bd ${p.cls}">${p.badge}</span>
        <img src="https://i.ytimg.com/vi/${p.id}/mqdefault.jpg" alt="">
        <span class="dur">${p.dur}</span></div>
      <h3 class="serif">${p.title}</h3>
      <div class="ch">${p.ch}</div>
      <div class="ds">${p.desc}</div>
    </div>`;
  }).join("") + `</div></div>`;
}

function article(i){
  cur = i;
  const p = PAGES[i];
  stage.innerHTML = `
  <div class="stage"><div class="art">
    <button class="back" onclick="grid()">← もどる</button>
    <div class="player" id="pv" onclick="play()">
      <img src="https://i.ytimg.com/vi/${p.id}/hqdefault.jpg" alt="">
      <div class="pl">▶</div>
    </div>
    <h2 class="serif">${p.title}</h2>
    <div class="meta">${p.ch}　·　${p.dur}
      <a href="https://www.youtube.com/watch?v=${p.id}" target="_blank" rel="noopener">YouTubeで開く ↗</a>
    </div>
    <p class="desc">${p.desc}</p>
    <div class="acts">
      <button class="next" onclick="mark('done')">見終わった</button>
      <button class="pass" onclick="mark('pass')">パス（既視感）</button>
      <button class="pass" onclick="mark('pass')">パス（気分じゃない）</button>
    </div>
  </div></div>`;
}

function play(){
  const p = PAGES[cur];
  if (IS_FILE){
    window.open(`https://www.youtube.com/watch?v=${p.id}`, "_blank");
    return;
  }
  document.getElementById("pv").outerHTML =
    `<div class="player"><iframe
      src="https://www.youtube.com/embed/${p.id}?autoplay=1&rel=0"
      referrerpolicy="strict-origin-when-cross-origin"
      allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe></div>`;
}

function mark(st){
  S[cur] = st;
  save();
  resolved() === PAGES.length ? ending() : grid();
}

function ending(){
  updateRest();
  const d = S.filter(x=>x==="done").length, ps = S.filter(x=>x==="pass").length;
  stage.innerHTML = `
  <div class="stage"><div class="end">
    <h2 class="serif">おしまい</h2>
    <div class="stats">見た ${d}　·　パス ${ps}</div>
    <p class="nx serif">次は、明日の朝。</p>
    <button class="copy" onclick="copyReport(this)">今日の結果をコピー</button>
    <p class="hint">チャットに貼ると、次の号がかしこくなる</p>
  </div></div>`;
}

function copyReport(btn){
  const lines = [ISSUE.issue + " の結果"];
  PAGES.forEach((p,i)=>{ lines.push((S[i]==="done" ? "見た" : "パス") + "：" + p.title); });
  const txt = lines.join("\n");
  const done = () => { btn.textContent = "コピーした！あとはチャットに貼るだけ"; };
  const fallback = () => {
    const ta = document.createElement("textarea");
    ta.value = txt; document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); } catch(e) {}
    ta.remove(); done();
  };
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done).catch(fallback);
  } else fallback();
}

grid();
</script>
</body>
</html>
